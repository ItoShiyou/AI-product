<!DOCTYPE html>
<html lang="ja" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>統一計算機</title>
    <link rel="stylesheet" href="../core.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell calc-shell">
      <header class="app-bar calc-bar">
        <h1 class="ba-title calc-title">統一計算機</h1>
        <button id="themeToggle" class="btn-secondary compact" type="button" aria-label="テーマ切り替え">
          Dark
        </button>
      </header>

      <main class="app-main">
        <section class="ba-card" aria-label="表示">
          <p id="expressionLabel" class="expression-label">0</p>
          <p id="resultLabel" class="result-label">0</p>
          <p id="historyLabel" class="muted">履歴: なし</p>
        </section>

        <section class="ba-card" aria-label="計算ボタン">
          <div class="keypad">
            <button class="key key-func" data-action="clear" type="button">AC</button>
            <button class="key key-func" data-action="delete" type="button">DEL</button>
            <button class="key key-func" data-action="percent" type="button">%</button>
            <button class="key key-op" data-action="operator" data-value="/" type="button">÷</button>

            <button class="key" data-action="digit" data-value="7" type="button">7</button>
            <button class="key" data-action="digit" data-value="8" type="button">8</button>
            <button class="key" data-action="digit" data-value="9" type="button">9</button>
            <button class="key key-op" data-action="operator" data-value="*" type="button">×</button>

            <button class="key" data-action="digit" data-value="4" type="button">4</button>
            <button class="key" data-action="digit" data-value="5" type="button">5</button>
            <button class="key" data-action="digit" data-value="6" type="button">6</button>
            <button class="key key-op" data-action="operator" data-value="-" type="button">−</button>

            <button class="key" data-action="digit" data-value="1" type="button">1</button>
            <button class="key" data-action="digit" data-value="2" type="button">2</button>
            <button class="key" data-action="digit" data-value="3" type="button">3</button>
            <button class="key key-op" data-action="operator" data-value="+" type="button">＋</button>

            <button class="key" data-action="digit" data-value="0" type="button">0</button>
            <button class="key" data-action="dot" type="button">.</button>
            <button class="key key-eq" data-action="equals" type="button">=</button>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <small>&copy; THE Bonjin 2019&ndash;2026</small>
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
