<!DOCTYPE html>
<html lang="ja" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体重記録</title>
    <link rel="stylesheet" href="../core.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell weight-shell">
      <header class="app-bar weight-bar">
        <h1 class="ba-title weight-title">体重記録</h1>
        <button id="themeToggle" class="btn-secondary compact" type="button" aria-label="テーマ切り替え">
          Dark
        </button>
      </header>

      <main class="app-main">
        <section class="ba-card" aria-label="記録を追加">
          <div class="form-grid">
            <div class="form-field">
              <label class="field-label" for="weightInput">体重 (kg)</label>
              <input
                id="weightInput"
                class="form-control"
                type="number"
                min="20"
                max="300"
                step="0.1"
                placeholder="65.0"
                inputmode="decimal"
              />
            </div>
            <div class="form-field">
              <label class="field-label" for="dateInput">日付</label>
              <input id="dateInput" class="form-control" type="date" />
            </div>
          </div>
          <p id="statusMessage" class="muted" aria-live="polite">体重を入力して追加してください</p>
          <button id="addRecordBtn" class="ba-button add-btn" type="button">記録する</button>
        </section>

        <section class="ba-card" aria-label="推移グラフ">
          <div class="list-header">
            <h2 class="section-title">推移</h2>
            <span id="latestLabel" class="muted">最新: --.-kg</span>
          </div>
          <canvas id="trendChart" class="trend-chart" width="600" height="260" aria-label="体重推移グラフ"></canvas>
          <p id="changeLabel" class="muted">前回差分: --</p>
        </section>

        <section class="ba-card" aria-label="記録一覧">
          <div class="list-header">
            <h2 class="section-title">記録一覧</h2>
            <span id="countLabel" class="muted">0件</span>
          </div>
          <ul id="recordList" class="record-list" aria-live="polite"></ul>
          <p id="emptyState" class="empty-state">記録はまだありません。</p>
        </section>
      </main>

      <footer class="app-footer">
        <small>&copy; THE Bonjin 2019&ndash;2026</small>
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
