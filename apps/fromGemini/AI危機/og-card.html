<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI危機 OG Card</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 20% 18%, rgba(0, 229, 255, 0.24), transparent 35%),
        radial-gradient(circle at 82% 78%, rgba(255, 75, 75, 0.24), transparent 36%),
        linear-gradient(135deg, #061924, #0f1521 56%, #160b0d);
      color: #ffffff;
    }

    .frame {
      box-sizing: border-box;
      width: 1200px;
      height: 630px;
      padding: 44px 58px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
    }

    .kicker {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.24em;
      color: rgba(255, 255, 255, 0.85);
      margin: 0;
    }

    .job {
      margin: 16px 0 0;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 1084px;
      color: #ffffff;
    }

    .rate {
      margin: 132px 0 0;
      font-size: 110px;
      line-height: 1;
      font-weight: 900;
      color: #ff4b4b;
      text-shadow: 0 0 18px rgba(255, 75, 75, 0.35);
    }

    .life {
      margin: 18px 0 0;
      font-size: 56px;
      line-height: 1.2;
      font-weight: 800;
      color: #f7c948;
      text-shadow: 0 0 14px rgba(247, 201, 72, 0.28);
    }

    .bottom {
      position: absolute;
      left: 58px;
      right: 58px;
      bottom: 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 24px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.86);
    }

    .warn {
      color: #7ee6ff;
    }

    .score {
      color: #8bf7c1;
    }
  </style>
</head>
<body>
  <div class="frame">
    <p class="kicker">AI余命宣告</p>
    <h1 id="job" class="job">診断結果</h1>
    <p id="rate" class="rate">AI代替率: 0.00%</p>
    <p id="life" class="life">職種余命: 0.0年</p>
    <div class="bottom">
      <span id="warn" class="warn">警告レベル: 計測</span>
      <span id="score" class="score">AI準備度: -</span>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const r = Number(p.get('r'));
    const l = Number(p.get('l'));
    const j = String(p.get('j') || '診断結果').slice(0, 28);
    const w = String(p.get('w') || '計測').slice(0, 12);
    const s = String(p.get('s') || '-').slice(0, 6);

    const rate = Number.isFinite(r) ? r.toFixed(2) : '0.00';
    const life = Number.isFinite(l) ? l.toFixed(1) : '0.0';

    document.getElementById('job').textContent = j;
    document.getElementById('rate').textContent = `AI代替率: ${rate}%`;
    document.getElementById('life').textContent = `職種余命: ${life}年`;
    document.getElementById('warn').textContent = `警告レベル: ${w}`;
    document.getElementById('score').textContent = `AI準備度: ${s}`;
  </script>
</body>
</html>
